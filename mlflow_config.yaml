experiment_name: modelo_clasificacion_sentimientos
model_name: modelo_sentimiento_financiero
tracking:
  tool: MLflow
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
  parameters:
    - vectorizer
    - classifier
versioning:
  repository: GitHub
  model_artifact: models/modelo_sentimiento.joblib
  metrics_file: metrics/metrics.json
  rollback_strategy: mantener versiones anteriores del modelo y recuperar el artefacto estable si una nueva versión reduce el rendimiento
monitoring:
  thresholds:
    accuracy: 0.20
    precision: 0.20
    recall: 0.20
    f1_score: 0.20
